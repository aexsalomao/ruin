site_name: ruin
site_description: Polars-first risk metrics for quant hedge funds
site_url: https://aexsalomao.github.io/ruin
repo_url: https://github.com/aexsalomao/ruin
repo_name: aexsalomao/ruin
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.action.edit
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aexsalomao/ruin
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pyruin/
      name: PyPI

copyright: Copyright &copy; 2026 Antônio Salomão

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - pymdownx.details
  - tables

nav:
  - Home: index.md
  - API Reference: api.md
  - Conventions: conventions.md
  - Metrics: metrics.md
  - Contributing: contributing.md
  - Changelog: changelog.md
